<script>
  const questionInput = document.getElementById('question');
  const answerPanel = document.getElementById('answer-panel');
  const answerEmpty = document.getElementById('answer-empty');
  const answerEl = document.getElementById('answer');
  const saveNoteBtn = document.getElementById('save-note-btn');
  const studyBridgeLinkEl = document.getElementById('study-bridge-link');
  const practiceRecommendationEl = document.getElementById('practice-recommendation');
  const practiceRecommendationTitleEl = document.getElementById('practice-recommendation-title');
  const practiceRecommendationMetaEl = document.getElementById('practice-recommendation-meta');
  const practiceRecommendationLinkEl = document.getElementById('practice-recommendation-link');
  let latestQuestionRecord = null;
  let historyRecords = [];

  function renderHistory() {
    historyRecords = JSON.parse(localStorage.getItem('qaHistory') || '[]');
    const historyEl = document.getElementById('question-history');
    if (!historyRecords.length) {
      historyEl.innerHTML = '<div>还没有提问记录。</div>';
      return;
    }
    historyEl.innerHTML = historyRecords.map((item, index) => `
      <button class="w-full text-left rounded-2xl bg-surfaceSoft p-4 hover:bg-blue-50 transition" onclick="restoreQuestion(${index})">
        <div class="font-medium text-ink">${item.question}</div>
        <div class="text-xs text-muted mt-1">${item.time}</div>
      </button>
    `).join('');
  }

  function restoreQuestion(index) {
    const item = historyRecords[index];
    if (!item) return;
    questionInput.value = item.question;
    answerPanel.classList.remove('hidden');
    answerEmpty.classList.add('hidden');
    answerEl.textContent = item.answer;
    renderPracticeRecommendation(item.practice_recommendation || null);
  }

  function buildPracticeLink(recommendation) {
    const params = new URLSearchParams();
    params.set('subject', recommendation.subject);
    params.set('grade', recommendation.grade);
    params.set('count', recommendation.count || 3);
    params.set('question_types', (recommendation.question_types || []).join(','));
    params.set('concept', recommendation.concept || '');
    return `practice.html?${params.toString()}`;
  }

  function renderPracticeRecommendation(recommendation) {
    if (!recommendation) {
      practiceRecommendationEl.classList.add('hidden');
      practiceRecommendationTitleEl.textContent = '';
      practiceRecommendationMetaEl.textContent = '';
      practiceRecommendationLinkEl.href = 'practice.html';
      practiceRecommendationLinkEl.textContent = '去练习';
      studyBridgeLinkEl.href = 'practice.html';
      return;
    }

    practiceRecommendationTitleEl.textContent = `${recommendation.concept} · ${recommendation.subject}`;
    practiceRecommendationMetaEl.textContent = `${recommendation.grade} · ${(recommendation.question_types || []).join(' / ')} · ${recommendation.count || 3} 题`;
    practiceRecommendationLinkEl.href = buildPracticeLink(recommendation);
    practiceRecommendationLinkEl.textContent = '去练习';
    studyBridgeLinkEl.href = buildPracticeLink(recommendation);
    practiceRecommendationEl.classList.remove('hidden');
  }

  async function askQuestion() {
    const question = questionInput.value.trim();
    if (!question) {
      alert('请输入问题');
      return;
    }

    answerPanel.classList.remove('hidden');
    answerEmpty.classList.add('hidden');
    answerEl.textContent = '正在生成回答...';
    saveNoteBtn.classList.add('hidden');

    const response = await fetch('/api/qa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await response.json();
    if (data.error) {
      answerEl.textContent = data.error;
      renderPracticeRecommendation(null);
      return;
    }

    answerEl.textContent = data.answer;
    renderPracticeRecommendation(data.practice_recommendation || null);
    latestQuestionRecord = {
      question,
      answer: data.answer,
      time: new Date().toLocaleString('zh-CN'),
      practice_recommendation: data.practice_recommendation || null,
    };
    localStorage.setItem('recentQuestion', JSON.stringify(latestQuestionRecord));
    saveNoteBtn.classList.remove('hidden');
  }

  function saveToHistory() {
    if (!latestQuestionRecord) return;
    const history = JSON.parse(localStorage.getItem('qaHistory') || '[]');
    history.unshift(latestQuestionRecord);
    localStorage.setItem('qaHistory', JSON.stringify(history.slice(0, 6)));
    renderHistory();
  }

  document.getElementById('ask-btn').addEventListener('click', askQuestion);
  document.getElementById('save-note-btn').addEventListener('click', saveToHistory);
  document.getElementById('clear-history').addEventListener('click', () => {
    localStorage.removeItem('qaHistory');
    renderHistory();
  });
  document.querySelectorAll('.example-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      questionInput.value = btn.dataset.example;
    });
  });
  renderHistory();
</script>
